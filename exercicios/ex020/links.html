<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
           
        }
        a:visited {
        color: rgb(8, 91, 168);
        }
        a{
         color: brown;
         text-decoration: none;
         font-weight: bold;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a::after {
            content: ' [link]';
            font-weight: normal;
            color: red;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1> Personalizando Links</h1>
    <ul>
        <li> <a href="https://www.youtube.com/@Pedrinks3" target="_blank" id="yt">Canal do Youtube</a></li>
        <li><a href="https://www.instagram.com/pedrz_fm/?__pwa=1" target="_blank" id="insta"> Instagram</a></li>
        <li> <a  href="https://github.com/gustavoguanabara/html-css/blob/master/aulas-pdf/15%20-Seletores%20personalizados.pdf" target="_blank" id="gt"> Github do Curso Em Video</a></li>
    </ul>
</body>
</html>
