<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Criando Videos em HTML5</title>
</head>
<body>
    <h1> <ins>Inserindo videos hospedados localmente</ins></h1>
    <p> Esse video está hospedado no meu próprio servidor.</p>
    <video width="560" controls poster="imagens/istockphoto-179054685-612x612.jpg">
        <source src="midia/videodecavalo.mp4" type="video/mp4">
        <source src="midia/videodecavalo.ogv" type="video/ogg">
    </video>
    <video width="560" controls poster="imagens/images.jpg">
        <source src="midia/videodecomida.mp4" type="video/mp4">
        <source src="midia/videodecomida.ogv" type="video/ogg">
    </video>
    <h1> Inserindo videos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/3N9OO_rjYlE?si=N5N2KCzyz35-YCTF" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
